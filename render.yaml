services:
  - type: web
    name: discord-bot-vnd
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/db run db:push && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: discord-bot-db
          property: connectionString
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /healthz

databases:
  - name: discord-bot-db
    plan: free
    databaseName: discord_bot
    user: discord_bot
